name: RelayIOS
options:
  deploymentTarget:
    iOS: "18.0"
packages:
  RelayIOSKit:
    path: RelayIOSKit
targets:
  RelayIOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RelayIOS
    dependencies:
      - package: RelayIOSKit
        product: RelayIOSKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.relay.ios
        PRODUCT_NAME: RelayIOS
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: Q9QM56HGXY
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Relay
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.relay.ios.auth
            CFBundleURLSchemes:
              - relayios
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RelayIOS:
    build:
      targets:
        RelayIOS: all
    run:
      config: Debug
      environmentVariables:
        RELAY_IOS_BASE_URL: https://relay-web-9g6d.onrender.com
